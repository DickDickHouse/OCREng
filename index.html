<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>簡易版飛行棋 Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/OCREng/style.css?v=101" />
</head>
<body>
  <h1>簡易版飛行棋 Demo</h1>

  <div id="controls">
    <div class="info-block">
      <div>目前玩家：</div>
      <div><span id="current-player-name">紅方</span></div>
    </div>
    <div class="info-block">
      <div>骰子點數：</div>
      <div><span id="dice-result">-</span></div>
    </div>
    <div class="button-block">
      <button id="roll-button" type="button">擲骰子</button>
      <button id="reset-button" type="button">重新開始</button>
    </div>
  </div>

  <p id="version">版本：載入中…</p>
  <p id="status"></p>

  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <!-- ✅ 這行會先把版本改成 inline OK -->
  <script>
    const v = document.getElementById("version");
    if (v) v.textContent = "版本：inline OK";
  </script>

  <!-- ✅ 如果 main.js 載入失敗，會顯示錯誤 -->
  <script src="/OCREng/main.js?v=101"
          onerror="document.getElementById('status').textContent='JS 載入失敗（main.js 沒有執行）';">
  </script>
</body>
</html>
