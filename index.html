
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁版飛行棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>簡易版飛行棋 Demo</h1>
    <div id="version"></div>
    
    <div id="controls">
        <div class="info-block">
            目前玩家：<span id="current-player-name">-</span>
        </div>
        <div class="dice-display">
            <img id="dice-image" class="dice-image" src="images/dice-blank.svg" alt="Dice">
            <span id="dice-result"></span>
        </div>
        <div id="status"></div>
    </div>

    <div id="controls">
        <div class="button-block">
            <button id="roll-button">擲骰子</button>
        </div>
        <div class="rule-controls">
            <select id="launch-rule">
                <option value="6">6 點起飛</option>
                <option value="even">雙數起飛</option>
                <option value="odd">單數起飛</option>
            </select>
            <button id="confirm-rule">確定規則</button>
        </div>
        <div id="rule-status"></div>
    </div>

    <div id="board-wrapper">
        <div id="board"></div>
    </div>

    <div id="bottom-controls">
        <button id="reset-button">重新開始</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
