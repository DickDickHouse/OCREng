<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>簡易版飛行棋 Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>簡易版飛行棋 Demo</h1>

  <div id="game-info">
    <p>目前玩家：<span id="current-player-name">紅方</span></p>
    <p>骰子點數：<span id="dice-result">-</span></p>
    <p id="status"></p>
  </div>

  <button id="roll-button" aria-label="擲骰子">擲骰子</button>
  <button id="new-game-button" aria-label="重新開始遊戲">新遊戲</button>

  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
